name: MindLinkApp
options:
  bundleIdPrefix: com.mindlink
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "2"   # 2 = iPad only
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MindLinkApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MindLinkApp
        excludes:
          - "**/*.md"
    dependencies:
      - sdk: ExternalAccessory.framework
      - sdk: CoreBluetooth.framework
      - sdk: MessageUI.framework
    info:
      path: MindLinkApp/App/Info.plist
      properties:
        CFBundleDisplayName: MindLink EEG
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        # Allow the app to talk to the paired MindLink / TGAM1 over Classic BT
        UISupportedExternalAccessoryProtocols:
          - com.neurosky.thinkgear
        NSBluetoothAlwaysUsageDescription: "MindLink EEG needs Bluetooth to connect to your TGAM1/MindLink EEG sensor."
        NSBluetoothPeripheralUsageDescription: "MindLink EEG needs Bluetooth to stream EEG data from your sensor."
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mindlink.MindLinkApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
